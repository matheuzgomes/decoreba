name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build CLI
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o nul ./cmd/decoreba
          else
            go build -o /dev/null ./cmd/decoreba
          fi
