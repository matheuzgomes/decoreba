name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          name="decoreba-$GOOS-$GOARCH"
          if [ "$GOOS" = "windows" ]; then name="$name.exe"; fi
          go build -ldflags="-s -w" -o "$name" ./cmd/decoreba

      - name: Package binary for npm
        shell: bash
        run: |
          name="decoreba-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            name="${name}.exe"
            if command -v 7z &>/dev/null; then
              7z a "${name}.zip" "$name"
            else
              zip -r "${name}.zip" "$name"
            fi
          else
            tar czf "${name}.tar.gz" "$name"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: decoreba-*

  desktop:
    if: false
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
          - { os: macos-latest,   goos: darwin,  goarch: amd64 }
          - { os: macos-14,       goos: darwin,  goarch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build Desktop
        working-directory: cmd/decoreba-desktop
        shell: bash
        run: $(go env GOPATH)/bin/wails build -nopackage -platform ${{ matrix.goos }}/${{ matrix.goarch }}

      - name: Rename binary
        shell: bash
        run: |
          GOOS="${{ matrix.goos }}"
          GOARCH="${{ matrix.goarch }}"
          if [ "$GOOS" = "windows" ]; then
            mv cmd/decoreba-desktop/build/bin/decoreba-desktop.exe "decoreba-desktop-${GOOS}-${GOARCH}.exe"
          else
            mv cmd/decoreba-desktop/build/bin/decoreba-desktop "decoreba-desktop-${GOOS}-${GOARCH}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: decoreba-desktop-*

  release:
    needs: [cli]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          find dist -type f -name 'decoreba-*' -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  publish-npm:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
